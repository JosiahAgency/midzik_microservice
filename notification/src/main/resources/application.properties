spring.application.name=notification
server.port=8085

# SMtP server settings
spring.mail.host=rs10.rcnoc.com
spring.mail.port=465
spring.mail.username=morekwa@midziklabs.com
spring.mail.password=Morekwa@2025!

# SMTP properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.required=true

#mysql settings
# spring.datasource.url=jdbc:mysql://localhost:3306/midzik_notification_microservice
spring.datasource.url=jdbc:mysql://mysql:3306/midzik_notification_microservice
spring.datasource.username=midzik_admin
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Devtools
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=1000
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java, src/main/resources

#Eureka
eureka.client.serviceUrl.defaultZone=http://registry:8761/eureka
# eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka


#Kafka
spring.kafka.bootstrap-servers=broker:29092
# spring.kafka.bootstrap-servers=localhost:9092