services:
  registry:
    build: 
      context: ./service-registry
      dockerfile: ./docker/Dockerfile
    ports:
      - "8761:8761"
    networks:
      - midzik-springboot-network
  gateway:
    build:
      context: ./gateway
      dockerfile: ./docker/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - registry
      - advertisement
      - analytics
      - authentication
    networks:
      - midzik-springboot-network
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://registry:8761/eureka
  mysql:
    image: mysql/mysql-server:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: advertisement
    command: --default-authentication-plugin=caching_sha2_password
    volumes:
      - ./db:/var/lib/mysql
    networks:
      - midzik-springboot-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s
  advertisement:  
    build:
      context: ./advertisement
      dockerfile: ./docker/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://registry:8761/eureka
    networks:
      - midzik-springboot-network
  authentication:
    build: 
      context: ./authentication
      dockerfile: ./docker/Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://registry:8761/eureka
    networks:
      - midzik-springboot-network
  analytics:
    build: 
      context: ./analytics
      dockerfile: ./docker/Dockerfile
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://registry:8761/eureka
    networks:
      - midzik-springboot-network
networks:
  midzik-springboot-network:
    driver: bridge
  
